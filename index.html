<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Game Boy Emulator</title>
  <meta name="description"
    content="Interactive Game Boy emulator for the web with custom keybinds, save/load states, speed and volume controls, and a retro handheld UI.">
  <meta name="author" content="Mitch Ivin">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <link rel="canonical" href="https://mitchivin.github.io/gameboy/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Interactive Game Boy Emulator">
  <meta property="og:title" content="Interactive Game Boy">
  <meta property="og:description"
    content="Play Game Boy and Game Boy Color ROMs in a browser with custom controls and classic handheld styling.">
  <meta property="og:url" content="https://mitchivin.github.io/gameboy/">
  <meta property="og:image" content="https://mitchivin.github.io/gameboy/public/socials/interactive-gameboy-og.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Interactive Game Boy">
  <meta name="twitter:description"
    content="Web-based Game Boy emulator with save states, keybind customization, and responsive retro UI.">
  <meta name="twitter:image" content="https://mitchivin.github.io/gameboy/public/socials/interactive-gameboy-og.jpg">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Interactive Game Boy Emulator",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "url": "https://mitchivin.github.io/gameboy/",
      "description": "Interactive Game Boy emulator for the web with keybind customization, save states, and retro handheld UI.",
      "author": {
        "@type": "Person",
        "name": "Mitch Ivin",
        "url": "https://mitchivin.com/"
      }
    }
  </script>
  <link rel="icon" type="image/png" href="public/fav.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* Hide scrollbars globally */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
  <script src="js/core/resampler.js"></script>
  <script src="js/core/XAudioServer.js"></script>
  <script src="js/core/resize.js"></script>
  <!-- Core emulator files -->
  <script src="js/core/GameBoyCore.js"></script>
  <script src="js/core/GameBoyIO.js"></script>
</head>

<body class="app-loading awaiting-mobile-confirm">

  <!-- ── Header ────────────────────────────────────────────── -->
  <header class="blueprint-header is-corner">
    <span class="corner-label corner-top-left">Game Boy Color</span>
    <span class="corner-label corner-top-right">Preset 1</span>
  </header>

  <!-- ── Device Shell ───────────────────────────────────────── -->
  <div id="gameboy-container">

    <exported-content id="gameboy-component"></exported-content>

  </div>

  <div id="app-shell-loader" aria-live="polite" aria-label="Loading Game Boy shell">
    <div class="gameboy-loader-box">
      <div class="gameboy-loader-spinner" aria-hidden="true"></div>
      <div class="gameboy-loader-text">BOOTING SHELL...</div>
    </div>
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer class="doodle-disclaimer is-corner">
    <span class="corner-label corner-bottom-left">built in <a href="https://doodledev.app" target="_blank" rel="noopener noreferrer">doodledev</a></span>
    <span class="corner-label corner-bottom-right">by <a href="https://mitchivin.com/" target="_blank" rel="noopener noreferrer">Mitch Ivin</a></span>
  </footer>

  <!-- Assets to be mounted into Shadow DOM -->
  <div id="shadow-assets" class="hidden">
    <!-- Screen Display Area - Canvas for Game Rendering -->
    <div id="rom-mode-container"
      class="w-full h-full flex items-center justify-center relative overflow-hidden hidden pointer-events-auto">
      <canvas id="gameboy-screen" class="w-full h-full" style="display: block; object-fit: fill;"></canvas>
    </div>

    <!-- Menu Mode Container -->
    <div id="menu-mode-container" class="w-full h-full flex relative overflow-hidden pointer-events-auto">
      <div class="w-full h-full flex flex-col overflow-hidden relative">

        <div class="w-full h-full flex flex-col items-center justify-center">
          <div class="relative w-full h-full flex flex-col items-center justify-start overflow-hidden">
            <!-- Carousel Track -->
            <div id="rom-carousel" class="flex flex-col transition-transform duration-500">
              <!-- ROM Cards with integrated buttons will be injected here -->
            </div>
          </div>

        </div>

      </div>
      <!-- Hidden file inputs -->
      <input type="file" id="rom-file-input" accept=".gb,.gbc" class="hidden">
      <input type="file" id="save-state-input" accept=".sav,.json" class="hidden">
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
